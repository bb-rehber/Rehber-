<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bağcılar Belediyesi | Dijital Rehber</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { background: white; padding: 20px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* Üst Başlık */
        .header-title { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 25px; color: #444; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* Kontrol Paneli (Sayfa Sayısı ve Ara) */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px; }
        .search-box input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; width: 250px; }
        
        /* Tablo Yapısı */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        thead { background-color: #5897fb; color: white; }
        th { padding: 12px; text-align: left; font-size: 14px; border-right: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        td { padding: 10px 12px; border: 1px solid #eee; font-size: 13px; }
        
        /* Satır Renkleri */
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f5f9; }
        
        /* Favori ve Müdür Stilleri */
        .star { cursor: pointer; color: #ccc; font-size: 20px; }
        .star.active { color: #f1c40f; }
        .is-favorite { background-color: #fffdf0 !important; }
        .mudur-satir { font-weight: bold; color: #005596; }

        .dahili-no { color: #5897fb; font-weight: bold; width: 80px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">BAĞCILAR BELEDİYESİ REHBER BİLGİLERİ</div>

    <div class="controls">
        <div>
            Sayfada 
            <select id="pageSize">
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="all">Tümü</option>
            </select> 
            kayıt göster
        </div>
        <div class="search-box">
            Ara: <input type="text" id="searchInput">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 40px; text-align: center;">★</th>
                <th>Dahili No</th>
                <th>Ad Soyad</th>
                <th>Birim</th>
                <th>Ünvan</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Veriler JS ile buraya gelecek -->
        </tbody>
    </table>
    
    <div style="margin-top: 15px; font-size: 12px; color: #777;">
        Toplam Kayıt: <span id="totalCount">0</span>
    </div>
</div>

<script>
    // Örnek Veri Seti
    let rehberData = [
        {no: "11-00", ad: "MEHMET UYGUN", birim: "İMAR VE ŞEHİRCİLİK MÜDÜRLÜĞÜ", unvan: "MÜDÜR"},
        {no: "11-01", ad: "İBRAHİM ÇAĞRI MERT", birim: "İMAR VE ŞEHİRCİLİK MÜDÜRLÜĞÜ", unvan: "YAPI DENETİM BÜROSU ŞEFİ"},
        {no: "15-22", ad: "NURİ ÇAKAL", birim: "BİLGİ İŞLEM MÜDÜRLÜĞÜ", unvan: "MÜDÜR"},
        {no: "10-05", ad: "ALİ DALKILIÇ", birim: "İMAR VE ŞEHİRCİLİK MÜDÜRLÜĞÜ", unvan: "YAPI DENETİM"}
    ];

    let favoriler = JSON.parse(localStorage.getItem("rehber_favs")) || [];

    function temizle(t) {
        return t ? t.toString().replace(/İ/g, 'i').replace(/I/g, 'ı').toLowerCase().trim() : "";
    }

    function tabloCiz(liste) {
        const tbody = document.getElementById("tableBody");
        let html = "";

        // Sıralama: Önce favoriler, sonra Dahili No
        const sirali = [...liste].sort((a, b) => {
            const af = favoriler.includes(a.no) ? 1 : 0;
            const bf = favoriler.includes(b.no) ? 1 : 0;
            if (af !== bf) return bf - af;
            return a.no.localeCompare(b.no);
        });

        sirali.forEach(k => {
            const isFav = favoriler.includes(k.no);
            const isMudur = temizle(k.unvan).includes("mudur");
            
            html += `
                <tr class="${isFav ? 'is-favorite' : ''} ${isMudur ? 'mudur-satir' : ''}">
                    <td style="text-align:center;"><span class="star ${isFav ? 'active' : ''}" onclick="favToggle('${k.no}')">${isFav ? '★' : '☆'}</span></td>
                    <td class="dahili-no">${k.no}</td>
                    <td>${k.ad}</td>
                    <td>${k.birim}</td>
                    <td>${k.unvan}</td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
        document.getElementById("totalCount").innerText = sirali.length;
    }

    function favToggle(no) {
        favoriler = favoriler.includes(no) ? favoriler.filter(n => n !== no) : [...favoriler, no];
        localStorage.setItem("rehber_favs", JSON.stringify(favoriler));
        filtrele();
    }

    function filtrele() {
        const word = temizle(document.getElementById("searchInput").value);
        const sonuc = rehberData.filter(i => 
            temizle(i.ad).includes(word) || 
            temizle(i.birim).includes(word) || 
            temizle(i.unvan).includes(word) || 
            i.no.includes(word)
        );
        tabloCiz(sonuc);
    }

    document.getElementById("searchInput").addEventListener("input", filtrele);
    tabloCiz(rehberData);
</script>

</body>
</html>
