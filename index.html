<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altyapı Envanter Listesi</title>
    <style>
        :root { --primary: #4479d4; --dark: #334155; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        
        /* Sayfayı tam genişleten ana kaplayıcı */
        .container { 
            max-width: 98%; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); 
        }

        .header-top { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; text-align: center; }
        .header-top h2 { margin: 0; color: #2c3e50; text-transform: uppercase; letter-spacing: 1px; font-size: 22px; }
        .header-top p { margin: 5px 0 0; color: #64748b; font-weight: bold; font-size: 14px; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .show-records { font-size: 14px; color: #475569; }
        .show-records select { padding: 5px; border-radius: 4px; border: 1px solid #ddd; }
        
        #searchBox { width: 300px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }

        /* Tablo Tasarımı (Ekran görüntündeki gibi) */
        .table-area { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        
        th { 
            background: var(--primary); 
            color: white; 
            padding: 15px; 
            font-size: 14px; 
            text-transform: uppercase;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #334155; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #f1f5f9; cursor: pointer; }
        
        b { color: #1e293b; }
        code { background: #f1f5f9; color: #d32f2f; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }

        /* Kişi Kartı (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); }
        .modal-content { background: white; margin: 10vh auto; width: 450px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card-header { background: #1e293b; color: white; padding: 20px; position: relative; }
        .close { position: absolute; right: 15px; top: 15px; cursor: pointer; font-size: 20px; color: #94a3b8; }
        .card-body { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .info-lbl { font-size: 11px; font-weight: bold; color: #94a3b8; text-transform: uppercase; }
        .info-val { font-size: 14px; color: #1e293b; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h2>ALTYAPI ENVANTER LİSTESİ</h2>
        <p>BİLGİ İŞLEM MÜDÜRLÜĞÜ</p>
    </div>

    <div class="controls">
        <div class="show-records">
            Sayfada <select id="rowCount"><option value="50">50</option><option value="100">100</option></select> kayıt göster
        </div>
        <input type="text" id="searchBox" placeholder="İsim, birim veya devre ara..." onkeyup="filter()">
    </div>

    <div class="table-area">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">BİRİM ADI</th>
                    <th style="width: 20%;">MAHALLE</th>
                    <th style="width: 30%;">ADRES</th>
                    <th style="width: 20%;">DEVRE NO</th>
                </tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <div class="card-header">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="m-birim" style="margin:0; font-size:16px;"></h3>
        </div>
        <div class="card-body">
            <div class="info-row"><span class="info-lbl">Mahalle</span><span class="info-val" id="m-mahalle"></span></div>
            <div class="info-row"><span class="info-lbl">Açık Adres</span><span class="info-val" id="m-adres"></span></div>
            <div class="info-row"><span class="info-lbl">Devre No</span><span class="info-val"><code id="m-devre"></code></span></div>
            <div class="info-row"><span class="info-lbl">Dış IP</span><span class="info-val" id="m-ip" style="color:blue;"></span></div>
            <div class="info-row"><span class="info-lbl">Hız / Tip</span><span class="info-val" id="m-tip"></span></div>
            <div class="info-row"><span class="info-lbl">Durum</span><span class="info-val" style="color:green; font-weight:bold;">AKTİF</span></div>
        </div>
    </div>
</div>

<script>
    const liste = [
        { birim: "100.YIL MAHALLESİ HAVUZ", mahalle: "100.YIL", adres: "2162. Sokak No:3", devre: "yuzyilhavuzvdsl", tip: "100/4 Mbps - VDSL", ip: "BEKLENİYOR" },
        { birim: "KAZIM KARABEKİR BİLGİ EVİ", mahalle: "K.KARABEKİR", adres: "259. Sokak No:2", devre: "kk_bilgievi", tip: "50 Mbps - VDSL", ip: "BEKLENİYOR" },
        { birim: "GÜNEŞLİ BAĞ KAFE", mahalle: "GÜNEŞLİ", adres: "Fevzi Çakmak No:12", devre: "bagkafe_fiber", tip: "1000 Mbps - FTTX", ip: "BEKLENİYOR" },
        { birim: "ŞEHİR KÜTÜPHANESİ", mahalle: "SANCAKTEPE", adres: "Şehir Cad. No:5", devre: "kutuphane_metro", tip: "METRO ETH", ip: "BEKLENİYOR" }
    ];

    function draw(data) {
        document.getElementById('tBody').innerHTML = data.map(i => `
            <tr onclick="openCard('${i.birim}')">
                <td><b>${i.birim}</b></td>
                <td>${i.mahalle}</td>
                <td>${i.adres}</td>
                <td><code>${i.devre}</code></td>
            </tr>
        `).join('');
    }

    function filter() {
        const val = document.getElementById('searchBox').value.toLowerCase();
        const res = liste.filter(i => i.birim.toLowerCase().includes(val) || i.mahalle.toLowerCase().includes(val) || i.devre.toLowerCase().includes(val));
        draw(res);
    }

    function openCard(name) {
        const i = liste.find(x => x.birim === name);
        document.getElementById('m-birim').innerText = i.birim;
        document.getElementById('m-mahalle').innerText = i.mahalle;
        document.getElementById('m-adres').innerText = i.adres;
        document.getElementById('m-devre').innerText = i.devre;
        document.getElementById('m-ip').innerText = i.ip;
        document.getElementById('m-tip').innerText = i.tip;
        document.getElementById('myModal').style.display = "block";
    }

    function closeModal() { document.getElementById('myModal').style.display = "none"; }
    window.onclick = (e) => { if(e.target == document.getElementById('myModal')) closeModal(); }
    window.onload = () => draw(liste);
</script>

</body>
</html>
