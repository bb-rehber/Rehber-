<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bağcılar Belediyesi | Kurumsal Rehber</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { background: white; padding: 20px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; }
        .header-title { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 25px; color: #444; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 16px; }
        .search-box input { padding: 10px 15px; border: 1px solid #ccc; border-radius: 4px; width: 300px; font-size: 15px; }
        
        /* Sabit Başlık Katmanı */
        .table-wrapper { max-height: 75vh; overflow-y: auto; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; }
        thead th { 
            position: sticky; top: 0; z-index: 10; background-color: #5897fb; color: white;
            padding: 15px; text-align: left; font-size: 16px; border-right: 1px solid rgba(255,255,255,0.2);
        }

        /* Dahili No Ortalama ve Yazı Boyutu */
        td { padding: 12px 15px; border: 1px solid #eee; font-size: 15px; }
        .dahili-no { color: #5897fb; font-weight: bold; width: 100px; font-size: 16px; text-align: center; }
        
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f5f9; }
        .star { cursor: pointer; color: #ccc; font-size: 22px; user-select: none; }
        .star.active { color: #f1c40f; }
        .is-favorite { background-color: #fffdf0 !important; }
        .mudur-satir { font-weight: bold; color: #005596; background-color: #f0f7ff !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">BAĞCILAR BELEDİYESİ REHBER BİLGİLERİ</div>
    <div class="controls">
        <div>Sayfada 50 kayıt göster</div>
        <div class="search-box">
            Ara: <input type="text" id="searchInput" placeholder="İsim, birim veya dahili ara...">
        </div>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px; text-align: center;">★</th>
                    <th style="text-align: center;">Dahili No</th>
                    <th>Ad Soyad</th>
                    <th>Birim</th>
                    <th>Ünvan</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div style="margin-top: 15px; font-size: 14px; color: #666; font-weight: bold;">
        Toplam Kayıt: <span id="totalCount">0</span>
    </div>
</div>

<script>
    let rehberData = [];
    let favoriler = JSON.parse(localStorage.getItem("rehber_favs")) || [];

    // Verileri JSON dosyasından çekiyoruz
    async function verileriGetir() {
        try {
            const response = await fetch('rehber.json');
            rehberData = await response.json();
            tabloCiz(rehberData);
        } catch (error) {
            console.error("HATA: rehber.json dosyası bulunamadı veya formatı hatalı!");
        }
    }

    function normalizeText(text) {
        if (!text) return "";
        return text.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/İ/g, 'i').replace(/I/g, 'ı').replace(/Ş/g, 's').replace(/Ğ/g, 'g')
            .replace(/Ü/g, 'u').replace(/Ö/g, 'o').replace(/Ç/g, 'c').toLowerCase().trim();
    }

    function tabloCiz(liste) {
        const tbody = document.getElementById("tableBody");
        let html = "";
        const sirali = [...liste].sort((a, b) => {
            const af = favoriler.includes(a.no) ? 1 : 0;
            const bf = favoriler.includes(b.no) ? 1 : 0;
            return bf - af; // Sadece favoriler en üste, gerisi JSON'daki sırayla
        });

        sirali.forEach(k => {
            const isFav = favoriler.includes(k.no);
            const isMudur = normalizeText(k.unvan).includes("mudur");
            html += `
                <tr class="${isFav ? 'is-favorite' : ''} ${isMudur ? 'mudur-satir' : ''}">
                    <td style="text-align:center;"><span class="star ${isFav ? 'active' : ''}" onclick="favToggle('${k.no}')">${isFav ? '★' : '☆'}</span></td>
                    <td class="dahili-no">${k.no}</td>
                    <td style="font-weight: 500;">${k.ad}</td>
                    <td>${k.birim}</td>
                    <td>${k.unvan}</td>
                </tr>`;
        });
        tbody.innerHTML = html;
        document.getElementById("totalCount").innerText = sirali.length;
    }

    function favToggle(no) {
        favoriler = favoriler.includes(no) ? favoriler.filter(n => n !== no) : [...favoriler, no];
        localStorage.setItem("rehber_favs", JSON.stringify(favoriler));
        filtrele();
    }

    function filtrele() {
        const word = normalizeText(document.getElementById("searchInput").value);
        const sonuc = rehberData.filter(i => 
            normalizeText(i.ad).includes(word) || normalizeText(i.birim).includes(word) || 
            normalizeText(i.unvan).includes(word) || i.no.toString().includes(word)
        );
        tabloCiz(sonuc);
    }

    document.getElementById("searchInput").addEventListener("input", filtrele);
    verileriGetir(); // Sayfa açılınca JSON'ı yükle
</script>
</body>
</html>
